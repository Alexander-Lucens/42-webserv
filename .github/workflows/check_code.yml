name: CI Check

on:
  push:
    branches:
      - main
      - develop
      - prod
      - alex/connect
  pull_request:
    branches:
      - main
      - develop
      - prod

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Set up C environment
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential valgrind clang-format clang-tidy cppcheck libclang-18-dev python3-clang-18

    # Compilation check
    - name: Compile Project
      run: make re

