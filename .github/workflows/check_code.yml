name: CI Check

on:
  push:
    branches: [ "main", "develop", "prod", "alex/connect"]
  pull_request:
    branches: [ "main", "develop", "prod"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y make c++ clang

    # Compilation check
    - name: Compile Project
      run: make re

    # Check if its runinig
    - name: Run Smoke Test
      run: |
        ./webserv tests/configs/simple.conf &
        PID=$!
        sleep 3
        curl -v http://localhost:8080 || kill $PID 
        kill $PID

    