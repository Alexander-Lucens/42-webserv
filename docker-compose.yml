services:
  webserv:
    build:
      context: .
      target: builder

    container_name: webserv
    
    platform: linux/amd64

    volumes:
      - ./:/home/student/project
    
    ports:
      - "8080:8080"
      - "80:80"
      - "9090:9090"
      - "8081-8089:8081-8089"
      - "8000:8000"

    tty: true
    stdin_open: true
    
    command: tail -f /dev/null