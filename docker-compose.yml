services:
  webserv:
    build: .
    container_name: webserv
    
    platform: linux/amd64

    volumes:
      - ./:/home/student/project
    
    ports:
      - "8080:8080"
      - "80:80"
      - "9090:9090"
      - "8081-8089:8081-8089"
      - "3000:3000"
      - "4242:4242"
      - "8000:8000"
      - "1024-49151:1024-49151"

    tty: true
    stdin_open: true
    
    command: tail -f /dev/null