<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in | webserv</title>
    <link rel="stylesheet" href="/www/statics/style.css">
</head>
<body>
    <header class="header">
        <button id="theme-toggle" class="theme-toggle-btn">
            <span id="theme-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4.5"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"></path><path d="M12 3l0 18"></path><path d="M12 9l4.65 -4.65"></path><path d="M12 14.3l7.37 -7.37"></path><path d="M12 19.6l8.85 -8.85"></path></svg>
            </span>
        </button>
    </header>

    <main class="container">
        <h1 class="title">Sign in</h1>
        <p class="subtitle">Submit your details to test the POST method</p>
        
        <div class="card" style="max-width: 400px; width: 100%;">
            <form method="POST" action="/submit" style="display: flex; flex-direction: column;">
                <label for="username" class="input-label">Username</label>
                <input type="text" name="username" id="username" class="input-field" placeholder="Enter username" required>
                
                <label for="email" class="input-label">Email</label>
                <input type="email" name="email" id="email" class="input-field" placeholder="Enter email" required>
                
                <button type="submit" class="nav-btn" style="margin-top: 10px;">Submit</button>
            </form>
        </div>
        
        <div style="margin-top: 40px;">
            <a href="/index.html"><button type="button" class="nav-btn" style="max-width: 250px;">Back to Home</button></a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 webserv | Developed by Aleksandr Kuzmin | Antoine Margoloff | Lara Krämer</p>
    </footer>

    <script src="/www/statics/script.js"></script>
</body>
</html>
