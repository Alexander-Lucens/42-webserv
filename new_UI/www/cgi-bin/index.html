<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>CGI Test | webserv</title>
	<link rel="stylesheet" href="/www/styles/style.css">
</head>
<body>
	<header class="header">
		<button id="theme-toggle" class="theme-toggle-btn">
			<span id="theme-icon">
				<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4.5"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M12 12m-9 0a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"></path><path d="M12 3l0 18"></path><path d="M12 9l4.65 -4.65"></path><path d="M12 14.3l7.37 -7.37"></path><path d="M12 19.6l8.85 -8.85"></path></svg>
			</span>
		</button>
	</header>

	<main class="container">
		<h1 class="title">CGI Test</h1>
		<p class="subtitle">Test your CGI script execution</p>

		<div class="cards-grid">
			<div class="card">
				<h2>Rust CGI</h2>
				<form method="GET" action="/cgi-bin/rust_program">
					<label for="name_rust" class="input-label">Enter your name:</label>
					<input type="text" name="name" id="name_rust" class="input-field" placeholder="e.g., John" required>
					
					<button type="submit" class="nav-btn">Execute CGI - Rust</button>
				</form>
			</div>

			<div class="card">
				<h2>Python CGI</h2>
				<form method="GET" action="/cgi-bin/script.py">
					<label for="name_python" class="input-label">Enter your name:</label>
					<input type="text" name="name" id="name_python" class="input-field" placeholder="e.g., John" required>
					
					<button type="submit" class="nav-btn">Execute CGI - Python</button>
				</form>
			</div>
		</div>

		<div style="margin-top: 40px;">
			<a href="/index.html"><button type="button" class="nav-btn" style="max-width: 250px;">Back to Home</button></a>
		</div>
	</main>

	<footer>
		<p>&copy; 2026 webserv | Developed by Aleksandr Kuzmin | Antoine Margoloff | Lara Krämer</p>
	</footer>

	<script>
		const themeToggle = document.getElementById('theme-toggle');
		const currentTheme = localStorage.getItem('theme') || 'dark';

		document.documentElement.setAttribute('data-theme', currentTheme);

		themeToggle.addEventListener('click', () => {
			let theme = document.documentElement.getAttribute('data-theme');
			let newTheme = theme === 'dark' ? 'light' : 'dark';
			document.documentElement.setAttribute('data-theme', newTheme);
			localStorage.setItem('theme', newTheme);
		});

		document.querySelectorAll(".nav-btn").forEach(button => {
			button.addEventListener("mousemove", e => {
				const rect = button.getBoundingClientRect();
				const x = e.clientX - rect.left;
				const y = e.clientY - rect.top;
				button.style.setProperty("--x", `${x}px`);
				button.style.setProperty("--y", `${y}px`);
			});
		});
	</script>
</body>
</html>
