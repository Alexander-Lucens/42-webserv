<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CGI</title>
	<title>webserv</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CGI Test</h1>
  	<p>Test your CGI script execution</p>

	<div style="display: flex; justify-content: center;">

		<div class="form-container" style="margin: 0 10em">
			<h2>Rust CGI</h2>
			<form method="GET" action="/cgi-bin/rust_program">
				<div style="margin: 30px 0;">
					<label for="name">Enter your name:</label><br>
					<input type="text" name="name" id="name" placeholder="e.g., John" required>
				</div>
				
				<button type="submit" class="back-btn">Execute CGI - Rust</button>
			</form>
		</div>

		<div class="form-container" style="margin: 0 10em">
			<h2>Python CGI</h2>
			<form method="GET" action="/cgi-bin/script.py">
				<div style="margin: 30px 0;">
					<label for="name">Enter your name:</label><br>
					<input type="text" name="name" id="name" placeholder="e.g., John" required>
				</div>
				
				<button type="submit" class="back-btn">Execute CGI - Python</button>
			</form>
		</div>
	</div>

	<div style="margin-top: 30px;">
		<a href="/index.html"><button type="button" class="back-btn">Back to Home</button></a>
	</div>

	<footer>
		<p>&copy; 2026 webserv | Developed by Aleksandr Kuzmin | Antoine Margoloff | Lara Krämer</p>
	</footer>
</body>
</html>
