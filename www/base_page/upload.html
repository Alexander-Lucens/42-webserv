<!DOCTYPE html>

<html lang="en">
    <head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>webserv</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<h1>Upload File</h1>		
		<div class="form-container">
			<h2>Select file to upload</h2>
			<form method="POST" action="/upload" enctype="multipart/form-data" style="margin: 20px 0;">
				<div style="margin: 10px;">
					<input style= "color:#010000; background-color: #ede7e7;" type="file" name="file" id="file" required>
				</div>
				<div style="margin: 20px 0;">
					<input type="text" name="description" id="description" placeholder="Enter file description (Optional)">
				</div>
				<div style="margin: 30px 0;"></div>
				<button type="submit" class="upload-btn">Upload File</button>
				</div>
			</form>
		</div>
		
		<div style="margin-top: 30px;">
			<a href="/index.html"><button type="button" class="back-btn">Back to Home</button></a>
		</div>
	</body>
	</body>
